name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout site repo
        uses: actions/checkout@v4

      - name: Checkout matrix-visualiser source
        uses: actions/checkout@v4
        with:
          repository: fullwoodenshovel/matrix-visualiser
          path: matrix-visualiser-src

      - name: Install Rust with WASM target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Create dist folders
        run: mkdir -p dist/matrix/static

      - name: Copy site files
        run: |
          cp index.html dist/
          cp CNAME dist/
          cp matrix/index.html dist/matrix/

      - name: Build desktop WASM
        working-directory: matrix-visualiser-src
        run: |
          cargo build --target wasm32-unknown-unknown --release
          cp target/wasm32-unknown-unknown/release/matrix_visualiser.wasm \
             ../dist/matrix/static/matrix-visualiser.wasm

      - name: Build phone WASM
        working-directory: matrix-visualiser-src
        run: |
          cargo build --target wasm32-unknown-unknown --release --features touchscreen
          cp target/wasm32-unknown-unknown/release/matrix_visualiser.wasm \
             ../dist/matrix/static/matrix-visualiser-phone.wasm

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
